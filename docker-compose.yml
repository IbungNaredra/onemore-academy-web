services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: onemore
      POSTGRES_PASSWORD: onemore
      POSTGRES_DB: onemore_challenge
    ports:
      - "5432:5432"
    volumes:
      - onemore_pgdata:/var/lib/postgresql/data

volumes:
  onemore_pgdata:
